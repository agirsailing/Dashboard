name: Ingester Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "ingester/**"
      - ".github/workflows/ingester-tests.yml"
  pull_request:
    paths:
      - "ingester/**"
      - ".github/workflows/ingester-tests.yml"

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ingester

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "ingester/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "ingester/.python-version"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src/ingester/

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    defaults:
      run:
        working-directory: ingester

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "ingester/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --group dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: uv run pytest --cov=ingester --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: ingester/coverage.xml
          retention-days: 7
