name: Ingester Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "ingester/**"
      - ".github/workflows/ingester-tests.yml"
  pull_request:
    paths:
      - "ingester/**"
      - ".github/workflows/ingester-tests.yml"

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ingester

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "ingester/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: "ingester/.python-version"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src/ingester/

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    defaults:
      run:
        working-directory: ingester

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "ingester/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --group dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: uv run pytest --cov=ingester --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: ingester/coverage.xml
          retention-days: 7
